            correct: 2,
            explanation: "Kita harus bersyukur diciptakan sempurna dan menggunakan kesempurnaan itu untuk ibadah bekal akhirat."

        ];

        // --- APP COMPONENTS ---

        const QuizApp = () => {
          const [screen, setScreen] = useState('home'); 
          const [packetType, setPacketType] = useState(null);
          const [questions, setQuestions] = useState([]);
          const [answers, setAnswers] = useState({}); 
          const [score, setScore] = useState(0);
          
          // Pagination State
          const [currentPage, setCurrentPage] = useState(0);
          const questionsPerPage = 5;

          const startQuiz = (type) => {
            setPacketType(type);
            setQuestions(type === 'A' ? questionsPaketA : questionsPaketB);
            setAnswers({});
            setScore(0);
            setCurrentPage(0);
            setScreen('quiz');
          };

          const handleAnswer = (questionId, optionIdx) => {
            // Update jawaban yang dipilih
            setAnswers(prev => ({ ...prev, [questionId]: optionIdx }));
          };

          const handleNextPage = () => {
             // Scroll ke atas saat pindah halaman
             window.scrollTo({ top: 0, behavior: 'smooth' });
             setCurrentPage(prev => prev + 1);
          };

          const calculateScore = () => {
            let correctCount = 0;
            questions.forEach((q, idx) => {
              // Note: idx corresponds to question index in the array
              if (answers[idx] === q.correct) {
                correctCount++;
              }
            });
            const finalScore = (correctCount / questions.length) * 100;
            setScore(finalScore);
            setScreen('result');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const restart = () => {
            setScreen('home');
            setPacketType(null);
            setAnswers({});
            setCurrentPage(0);
          };

          const HomeScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-screen bg-blue-50 p-6 font-sans">
              <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border-t-8 border-blue-600">
                <div className="mb-6 flex justify-center">
                  <div className="bg-blue-600 text-white p-4 rounded-full">
                    <BookOpen size={48} />
                  </div>
                </div>
                <h1 className="text-2xl font-bold text-gray-800 mb-1">Bimbel Musafir One</h1>
                <p className="text-gray-500 mb-8 text-sm uppercase tracking-widest">Persiapan Ulangan PAI Kelas 4</p>
                
                <div className="space-y-4">
                  <button 
                    onClick={() => startQuiz('A')}
                    className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-all flex items-center justify-between group"
                  >
                    <div className="text-left">
                      <div className="text-lg">Paket A</div>
                      <div className="text-xs opacity-90 font-normal">Level Sedang (Hafalan & Arti)</div>
                    </div>
                    <ArrowRight className="group-hover:translate-x-1 transition-transform" />
                  </button>

                  <button 
                    onClick={() => startQuiz('B')}
                    className="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 px-6 rounded-xl shadow-md transition-all flex items-center justify-between group"
                  >
                    <div className="text-left">
                      <div className="text-lg">Paket B</div>
                      <div className="text-xs opacity-90 font-normal">Level Sulit (Analisis & Tajwid)</div>
                    </div>
                    <ArrowRight className="group-hover:translate-x-1 transition-transform" />
                  </button>
                </div>

                <div className="mt-8 text-xs text-gray-400">
                  Materi: Q.S. At-Tin & Hadis Silaturahmi
                </div>
              </div>
            </div>
          );

          const QuizScreen = () => {
            // Hitung index soal untuk halaman ini
            const indexOfLastQuestion = (currentPage + 1) * questionsPerPage;
            const indexOfFirstQuestion = indexOfLastQuestion - questionsPerPage;
            const currentQuestions = questions.slice(indexOfFirstQuestion, indexOfLastQuestion);
            const totalPages = Math.ceil(questions.length / questionsPerPage);

            return (
              <div className="flex flex-col min-h-screen bg-gray-100 font-sans pb-10">
                <div className="bg-white px-6 py-4 shadow-sm flex justify-between items-center sticky top-0 z-10">
                  <div className="flex items-center space-x-2 text-blue-800 font-bold">
                    <div className="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-sm">
                      {packetType}
                    </div>
                    <span>Halaman {currentPage + 1} / {totalPages}</span>
                  </div>
                  <div className="text-sm font-semibold text-gray-500">Bimbel Musafir One</div>
                </div>

                <div className="w-full max-w-2xl mx-auto mt-6 space-y-8 px-4">
                  {currentQuestions.map((q, index) => {
                    const actualIndex = indexOfFirstQuestion + index; // Index asli di array utama
                    return (
                      <div key={q.id} className="bg-white rounded-2xl p-6 shadow-md">
                        <div className="flex gap-3 mb-4">
                           <span className="bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded-lg h-fit text-sm">
                             No. {actualIndex + 1}
                           </span>
                           <h2 className="text-lg font-medium text-gray-800 leading-relaxed">
                              {q.question}
                           </h2>
                        </div>

                        <div className="space-y-3">
                          {q.options.map((opt, optIdx) => {
                            const isSelected = answers[actualIndex] === optIdx;
                            return (
                              <button
                                key={optIdx}
                                onClick={() => handleAnswer(actualIndex, optIdx)}
                                className={`w-full text-left p-4 border-2 rounded-xl shadow-sm transition-all font-medium flex items-center group
                                  ${isSelected 
                                    ? 'bg-blue-600 border-blue-600 text-white' 
                                    : 'bg-white border-transparent hover:border-blue-400 hover:bg-blue-50 text-gray-700'
                                  }`}
                              >
                                <span className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 text-sm font-bold transition-colors
                                   ${isSelected ? 'bg-white text-blue-600' : 'bg-gray-100 text-gray-500 group-hover:bg-blue-200 group-hover:text-blue-700'}
                                `}>
                                  {String.fromCharCode(65 + optIdx)}
                                </span>
                                {opt}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="max-w-2xl mx-auto w-full px-4 mt-8">
                  {currentPage < totalPages - 1 ? (
                    <button 
                      onClick={handleNextPage}
                      className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center transition-all"
                    >
                      Halaman Selanjutnya <ArrowRight className="ml-2" />
                    </button>
                  ) : (
                    <button 
                      onClick={calculateScore}
                      className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center transition-all animate-pulse"
                    >
                      Selesai & Lihat Nilai <CheckCircle className="ml-2" />
                    </button>
                  )}
                </div>
              </div>
            );
          };

          const ResultScreen = () => {
            const passed = score >= 75;

            return (
              <div className="min-h-screen bg-gray-100 font-sans p-6">
                <div className="max-w-3xl mx-auto space-y-6">
                  
                  <div className="bg-white rounded-3xl p-8 shadow-lg text-center relative overflow-hidden">
                    <div className={`absolute top-0 left-0 w-full h-2 ${passed ? 'bg-green-500' : 'bg-red-500'}`}></div>
                    
                    <div className="mb-4 flex justify-center">
                      {passed ? (
                        <div className="bg-green-100 p-4 rounded-full text-green-600 animate-bounce">
                          <Award size={64} />
                        </div>
                      ) : (
                        <div className="bg-red-100 p-4 rounded-full text-red-600">
                          <Brain size={64} />
                        </div>
                      )}
                    </div>

                    <h2 className="text-gray-500 font-medium uppercase tracking-wider text-sm mb-2">Nilai Akhir Kamu</h2>
                    <div className="text-6xl font-black text-gray-800 mb-2">{score.toFixed(1)}</div>
                    <div className={`text-xl font-bold ${passed ? 'text-green-600' : 'text-red-500'} mb-6`}>
                      {passed ? "LULUS - KERJA BAGUS!" : "BELUM LULUS - AYO BELAJAR LAGI!"}
                    </div>

                    <button 
                      onClick={restart}
                      className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center mx-auto transition-all"
                    >
                      <RefreshCw className="mr-2" size={20} /> Coba Paket Lain
                    </button>
                  </div>

                  <div className="bg-white rounded-2xl shadow-md overflow-hidden">
                    <div className="bg-blue-600 p-4 text-white font-bold flex items-center">
                      <CheckCircle className="mr-2" /> Pembahasan Soal
                    </div>
                    <div className="divide-y divide-gray-100">
                      {questions.map((q, idx) => {
                        const isCorrect = answers[idx] === q.correct;
                        return (
                          <div key={q.id} className="p-5 hover:bg-gray-50">
                            <div className="flex items-start gap-3">
                              <div className="mt-1">
                                {isCorrect ? (
                                  <CheckCircle className="text-green-500 w-6 h-6" />
                                ) : (
                                  <XCircle className="text-red-500 w-6 h-6" />
                                )}
                              </div>
                              <div className="flex-1">
                                <p className="font-semibold text-gray-800 mb-2">
                                  {idx + 1}. {q.question}
                                </p>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mb-3">
                                  <div className={`p-3 rounded-lg border ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                    <span className="block text-xs text-gray-500 uppercase mb-1">Jawaban Kamu</span>
                                    <span className="font-bold">{q.options[answers[idx]] || "Tidak Dijawab"}</span>
                                  </div>
                                  {!isCorrect && (
                                    <div className="p-3 rounded-lg bg-blue-50 border border-blue-100">
                                      <span className="block text-xs text-blue-500 uppercase mb-1">Jawaban Benar</span>
                                      <span className="font-bold text-blue-800">{q.options[q.correct]}</span>
                                    </div>
                                  )}
                                </div>

                                <div className="bg-gray-50 p-3 rounded-lg text-sm text-gray-600 border-l-4 border-gray-400">
                                  <span className="font-bold text-gray-700 block mb-1">Penjelasan:</span>
                                  {q.explanation}
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                </div>
              </div>
            );
          };

          return (
            <>
              {screen === 'home' && <HomeScreen />}
              {screen === 'quiz' && <QuizScreen />}
              {screen === 'result' && <ResultScreen />}
            </>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
    </script>
</body>
